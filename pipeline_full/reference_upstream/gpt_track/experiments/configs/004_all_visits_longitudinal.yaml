name: 004_all_visits_longitudinal
seed: 20260426
feature_set: all_visits_longitudinal
death_target_mode: censor_missing_death_at_last_visit
n_splits: 5
n_repeats: 3
# WARNING: high leakage risk. Hepatic-event patients may have visits past the
# event in the training data, so longitudinal summaries leak event status onto
# the input features. We still run this for leaderboard diagnostics.
models:
  - name: rsf
    params: {n_estimators: 300, max_depth: 6, min_samples_leaf: 5}
  - name: xgb_cox
    params: {n_estimators: 300, max_depth: 4, learning_rate: 0.05}
  - name: lgbm_binary
    params: {n_estimators: 400, learning_rate: 0.05, num_leaves: 31}
  - name: catboost_binary
    params: {iterations: 500, depth: 5, learning_rate: 0.05}
