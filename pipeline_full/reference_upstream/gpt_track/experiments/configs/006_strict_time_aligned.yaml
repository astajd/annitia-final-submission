name: 006_strict_time_aligned
seed: 20260426
feature_set: strict_time_aligned
death_target_mode: censor_missing_death_at_last_visit
n_splits: 5
n_repeats: 3
# Defensible longitudinal: training masks visits past the event/censoring age,
# test uses every visit (event time unknown by definition). The asymmetry is
# documented in reports/leakage_audit.md.
models:
  - name: rsf
    params: {n_estimators: 300, max_depth: 6, min_samples_leaf: 5}
  - name: xgb_cox
    params: {n_estimators: 300, max_depth: 4, learning_rate: 0.05}
  - name: lgbm_binary
    params: {n_estimators: 400, learning_rate: 0.05, num_leaves: 31}
  - name: catboost_binary
    params: {iterations: 500, depth: 5, learning_rate: 0.05}
